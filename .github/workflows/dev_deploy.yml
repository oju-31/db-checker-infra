name: Dev Infra CI/CD

on:
  push:
    branches:
      - dev
  # pull_request:
  #   branches:
  #     - dev
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkouT
  
jobs:
  terraform:
    name: 'Terraform and Python Lint'
    runs-on: ubuntu-latest
    environment: dev

    env:
      AWS_REGION: 'us-east-2'
      TF_VERSION: '1.5.0'
      TFLINT_VERSION: '0.54.0'  # Updated to a more recent version
      TFSEC_VERSION: '1.28.1'   # Updated to a more recent version

    steps:
    - name: 'Checkout GitHub repository'
      uses: actions/checkout@v4

    - name: 'Configure AWS credentials'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.GA_ROLE_ARN_DEV }}
        role-session-name: GitHub_to_AWS_via_FederatedOIDC
        aws-region: ${{ env.AWS_REGION }}

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: 'Terraform Init'
      run: terraform init -reconfigure -backend-config=config/backend-dev.hcl

    - name: 'Terraform Format'
      run: terraform fmt -check -recursive

    - name: 'Terraform Validate'
      run: terraform validate

    # - name: 'Terraform force unlock'
    #   run: terraform force-unlock -force 1857af4b-fa09-b2fe-9ad6-3e387d02c3be

    - name: 'Terraform Plan'
      if: github.event_name == 'push'
      run: terraform plan -var-file="config/dev.tfvars" -out=tfplan

    - name: 'Terraform Apply'
      if: github.event_name == 'push'
      run: terraform apply -auto-approve tfplan
